main:
  steps:
    - check_primary:
        call: googleapis.compute.v1.instances.get
        args:
          instance: "production-server"
          project: "terminator-478221"
          zone: "us-central1-a"
        result: primary_res
    - check_sc:
        call: googleapis.compute.v1.instances.get
        args:
          instance: "production-server-sc"
          project: "terminator-478221"
          zone: "us-east1-b"
        result: sc_res
    - evaluate_conflict:
        switch:
          - condition: ${primary_res.status == "RUNNING" and sc_res.status == "RUNNING"}
            next: stop_sc
        next: end
    - stop_sc:
        call: googleapis.compute.v1.instances.stop
        args:
          instance: "production-server-sc"
          project: "terminator-478221"
          zone: "us-east1-b"
