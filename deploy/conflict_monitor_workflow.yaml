main:
  steps:
    - check_primary:
        call: googleapis.compute.v1.instances.get
        args:
          instance: "production-server"
          project: "terminator-478221"
          zone: "us-central1-a"
        result: primary_res
    - check_backup:
        call: googleapis.compute.v1.instances.get
        args:
          instance: "production-server-backup"
          project: "terminator-478221"
          zone: "us-central1-c"
        result: backup_res
    - evaluate_conflict:
        switch:
          - condition: ${primary_res.status == "RUNNING" and backup_res.status == "RUNNING"}
            next: stop_backup
        next: end
    - stop_backup:
        call: googleapis.compute.v1.instances.stop
        args:
          instance: "production-server-backup"
          project: "terminator-478221"
          zone: "us-central1-c"
